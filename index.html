<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Magang</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #0052cc;
        }
        .status-badge {
            background-color: #e3fcef;
            color: #006644;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 { margin: 10px 0; color: #0052cc; }
        p { color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-badge">✓ GitHub Actions Success</div>
        <h1>Project Magang</h1>
        <p>Proyek Magang Tim 2026</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <small style="color: #999;">Fitur 3: Version Control & Legal References Sandbox</small>
    </div>

</body>
</html>
